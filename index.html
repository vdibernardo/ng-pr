<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nicole Greco Public Relations</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-slate-100">
    <nav class="flex items-center h-26 border-b border-slate-300">
      <div class="flex flex-grow justify-between items-center px-14">
        <div class="flex items-center h-6 w-auto">
          <img src="images/nicole-greco.svg" />
        </div>
        <ul class="flex justify-end gap-22">
          <li><a href="#" class="text-slate-500">press</a></li>
          <li><a href="#" class="text-slate-500">testimonials</a></li>
          <li><a href="#" class="text-slate-500">contact</a></li>
        </ul>
      </div>
    </nav>
    <main>
      <div class="flex border-b border-slate-300">
        <div class="flex items-center justify-center px-6 grow w-1/3">
          <h1 class="text-center max-w-100 text-6xl">
            Combining long-term, big picture brand strategy with PR to help
            consumer brands make their mark.
          </h1>
        </div>
        <div class="border-l-1 border-slate-300 w-2/3 max-w-220">
          <img class="f-full object-contain" src="images/NG-V2.gif" />
        </div>
      </div>
      <div
        class="flex flex-col items-center justify-center py-8 border-b border-slate-300 px-14"
      >
        <p class="text-center">
          Over nearly a decade of working at some of the top PR agencies in NYC,
          I’ve had the pleasure of collaborating with...
        </p>
        <div
          class="flex flex-row flex-wrap gap-12 justify-center items-center my-8 max-w-260 px-10"
        >
          <img
            class="h-16"
            src="images/marquee/fishwife_logo.png"
            alt="Fishwife Logo"
          />
          <img
            class="h-16"
            src="images/marquee/logo_graza.png"
            alt="Graza Logo"
          />
          <img
            class="h-16"
            src="images/marquee/logo_little sesame.png"
            alt="Little Sesame Logo"
          />
          <img
            class="h-16"
            src="images/marquee/logo_nomadica.png"
            alt="Nomadica Logo"
          />
          <img
            class="h-16"
            src="images/marquee/logo_houseplant.png"
            alt="Houseplant Logo"
          />
          <img
            class="h-16"
            src="images/marquee/logo_chomps.png"
            alt="Chomps Logo"
          />
          <img
            class="h-16"
            src="images/marquee/logo_ipsa.png"
            alt="Ipsa Logo"
          />
          <img
            class="h-16"
            src="images/marquee/logo_carbone.png"
            alt="Carbone Logo"
          />
          <img
            class="h-16"
            src="images/marquee/logo_summer water.png"
            alt="Summer Water Logo"
          />
          <img
            class="h-16"
            src="images/marquee/logo_heyday.png"
            alt="HeyDay Logo"
          />
        </div>
      </div>
